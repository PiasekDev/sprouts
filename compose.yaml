services:
  database:
    image: postgres:18.3-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sprouts
    ports:
      - "5432:5432"
    volumes:
      - database-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sprouts"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: production
      BIND_ADDRESS: 0.0.0.0:3000
      DATABASE_URL: postgres://admin:admin@database:5432/sprouts
      RUST_LOG: info
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Containerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  database-data:
